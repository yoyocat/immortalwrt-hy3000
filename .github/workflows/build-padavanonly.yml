name: Build padavanonly full firmware (with BTF+dae)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint \
            binutils bison build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
            git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
            libtool llvm lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync \
            scons squashfs-tools subversion swig texinfo uglifyjs unzip vim wget \
            xmlto xxd zlib1g-dev npm
          npm install -g pnpm || true
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"

      - name: Clone padavanonly source
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "Commit:"
          git log --oneline -1
          echo "Kernel version:"
          cat include/kernel-6.6

      - name: Update & install feeds (includes iStore)
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add luci-app-daed from QiuSimons
        run: |
          cd openwrt
          git clone --depth=1 https://github.com/QiuSimons/luci-app-daed.git package/dae
          ls package/dae/

      - name: Enable BTF + VETH + dae in kernel config
        run: |
          cd openwrt
          # Enable VETH
          sed -i 's/# CONFIG_VETH is not set/CONFIG_VETH=m/' target/linux/generic/config-6.6
          echo "VETH:"
          grep CONFIG_VETH target/linux/generic/config-6.6

      - name: Generate .config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_philips_hy3000=y

          # BTF / eBPF (required for dae)
          CONFIG_DEVEL=y
          CONFIG_KERNEL_DEBUG_INFO=y
          # CONFIG_KERNEL_DEBUG_INFO_REDUCED is not set
          CONFIG_KERNEL_DEBUG_INFO_BTF=y
          CONFIG_KERNEL_CGROUPS=y
          CONFIG_KERNEL_CGROUP_BPF=y
          CONFIG_KERNEL_BPF_EVENTS=y
          CONFIG_BPF_TOOLCHAIN_HOST=y
          CONFIG_KERNEL_XDP_SOCKETS=y
          CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
          CONFIG_PACKAGE_kmod-veth=y

          # dae
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_luci-app-daed=y
          CONFIG_PACKAGE_luci-i18n-daed-zh-cn=y

          # iStore (should be auto-selected from feed)
          CONFIG_PACKAGE_luci-app-store=y

          # LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

          # Useful packages
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_f2fsck=y
          CONFIG_PACKAGE_mkf2fs=y

          # WiFi
          CONFIG_PACKAGE_kmod-mt7915e=y
          CONFIG_PACKAGE_kmod-mt7981-firmware=y
          CONFIG_PACKAGE_mt7981-wo-firmware=y
          CONFIG_PACKAGE_wpad-openssl=y
          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set

          # Root filesystem
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          EOF
          make defconfig
          echo "=== Key config items ==="
          grep -E "BTF|BPF|dae|VETH|philips|istore|ROOTFS_PARTSIZE" .config | head -20

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        run: |
          cd openwrt
          echo "Compiling with $(nproc) threads..."
          make -j$(nproc) 2>&1 | tail -30 || make -j1 V=s 2>&1 | tail -100
          echo "status=success" >> $GITHUB_OUTPUT
          echo "=== Output files ==="
          ls -lh bin/targets/mediatek/filogic/ || true

      - name: Organize output
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/mediatek/filogic/
          rm -f packages sha256sums *.buildinfo *.manifest
          echo "=== Firmware files ==="
          ls -lh

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=hy3000-padavanonly-$(date +"%Y%m%d-%H%M")" >> $GITHUB_OUTPUT
          echo "date=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "HY3000 padavanonly + BTF/dae (${{ steps.tag.outputs.date }})"
          body: |
            ## Philips HY3000 - padavanonly immortalwrt-mt798x + BTF/dae

            **Based on your original firmware source (padavanonly/immortalwrt-mt798x-6.6)**

            Changes from your current system:
            - Added CONFIG_KERNEL_DEBUG_INFO_BTF=y (for dae eBPF support)
            - Added kmod-veth (required by dae)
            - Added daed + luci-app-daed
            - iStore / iStoreX preserved

            **Flash via sysupgrade:**
            ```
            sysupgrade -v /tmp/firmware.itb
            ```
          files: openwrt/bin/targets/mediatek/filogic/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware as artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: hy3000-padavanonly-firmware
          path: openwrt/bin/targets/mediatek/filogic/
