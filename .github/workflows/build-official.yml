name: Build Official ImmortalWrt for HY3000

on:
  push:
    branches: [main]
    paths: ['.github/workflows/build-official.yml']
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  COMMIT_SHA: 581050ce4e
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev npm
          sudo npm install -g pnpm || true
          sudo timedatectl set-timezone "$TZ"

      - name: Clone ImmortalWrt (pinned to kernel 6.6.119)
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt && git checkout $COMMIT_SHA
          echo "Commit: $(git log --oneline -1)"
          echo "Kernel: $(cat include/kernel-6.6)"

      - name: Add HY3000 support + VETH
        run: |
          chmod +x add-hy3000.sh
          bash add-hy3000.sh openwrt $GITHUB_WORKSPACE/patches

      - name: Update and install feeds
        run: |
          cd openwrt
          git config --global url."https://github.com/".insteadOf "git://github.com/"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add daed package
        run: |
          cd openwrt
          git clone --depth=1 https://github.com/QiuSimons/luci-app-daed.git package/dae

      - name: Write config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_philips_hy3000=y
          CONFIG_DEVEL=y
          CONFIG_KERNEL_DEBUG_INFO=y
          CONFIG_KERNEL_DEBUG_INFO_BTF=y
          CONFIG_KERNEL_CGROUPS=y
          CONFIG_KERNEL_CGROUP_BPF=y
          CONFIG_KERNEL_BPF_EVENTS=y
          CONFIG_BPF_TOOLCHAIN_HOST=y
          CONFIG_KERNEL_XDP_SOCKETS=y
          CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_luci-app-daed=y
          CONFIG_PACKAGE_luci-i18n-daed-zh-cn=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_f2fsck=y
          CONFIG_PACKAGE_mkf2fs=y
          CONFIG_PACKAGE_kmod-mt7915e=y
          CONFIG_PACKAGE_kmod-mt7981-firmware=y
          CONFIG_PACKAGE_mt7981-wo-firmware=y
          CONFIG_PACKAGE_wpad-openssl=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          EOF
          make defconfig
          grep -E "BTF|dae|VETH|philips|store" .config | head -15

      - name: Download
        run: cd openwrt && make download -j$(nproc) && find dl -size -1024c -exec rm -f {} \;

      - name: Compile
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s 2>&1 | tail -300
          echo "status=success" >> $GITHUB_OUTPUT
          ls -lh bin/targets/mediatek/filogic/

      - name: Upload to release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hy3000-v${{ github.run_number }}
          name: HY3000 ImmortalWrt + BTF/dae/iStore
          body: |
            ImmortalWrt 24.10 kernel 6.6.119 with BTF+dae+iStore for Philips HY3000
          files: openwrt/bin/targets/mediatek/filogic/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: hy3000-firmware
          path: openwrt/bin/targets/mediatek/filogic/
